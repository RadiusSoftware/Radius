    <!--
    <widget tagname="dataeditor-widget">
        <script>
            class DataEditorWidget extends Widget {
                constructor(arg) {
                    super(arg);
                }

                getMeta(key) {
                    let meta = {
                        key: key,
                        value: this.getControllerValue(key),
                    };

                    if (this.fields) {
                        if (Objekt.isObjekt(meta.value)) {
                            if (meta.value.isArray()) {
                                meta.type = ArrayType;
                            }
                            else {
                                meta.type = ObjectType;
                                meta.fields = [];

                                for (let field of this.fields) {
                                    for (let key in meta.value) {
                                        let subkey = `${meta.key}.${key}`;

                                        if (subkey.match(field.regex)) {
                                            if (field.hidden !== true) {
                                                meta.fields.push({
                                                    type: getJsType(meta.value[subkey]),
                                                    property: key,
                                                    key: subkey,
                                                    label: field.label ? field.label : key,
                                                });

                                                break;
                                            }
                                        }
                                    }
                                }

                                if (meta.fields.length) {
                                    return meta;
                                }
                            }
                        }
                        else {
                            meta.type = getJsType(meta.value);

                            for (let field of this.fields) {
                                if (key.match(field.regex)) {
                                    break;
                                }
                            }
                        }
                    }
                    
                    meta.readonly = true;

                    if (Objekt.isObjekt(meta.value)) {
                        if (meta.value.isArray()) {
                            meta.type = ArrayType;
                        }
                        else {
                            meta.type = ObjectType;

                            meta.fields = Object.keys(meta.value).map(property => {
                                return {
                                    type: getJsType(meta.value[property]),
                                    property: property,
                                    key: `${key}.${property}`,
                                    label: property,
                                }
                            });
                        }
                    }
                    else {
                        meta.type = getJsType(meta.value);
                    }

                    return meta;
                }

                init() {
                    if (this.getRdsBind) {
                        this.key = this.getRdsBind();
                        delete this.getRdsBind;
                    }
                    else {
                        return;
                    }

                    super.init();
                    this.fields = this.getPinned('fields');

                    if (this.fields) {
                        for (let field of this.fields) {
                            field.regex = new RegExp(`${field.tail}$`);
                        }
                    }

                    let surface = this.renderValue(this.key, false);

                    if (surface) {
                        this.append(surface);
                    }
                }

                onEdit(message) {
                    console.log(message);
                }

                renderArray(meta, readonly) {
                    let div = createElement('div');

                    for (let i in meta.value) {
                        let subkey = `${meta.key}.${i}`;
                        let surface = this.renderValue(subkey, readonly || meta.readonly);

                        if (surface) {
                            div.append(surface);
                        }
                    }

                    if (!readonly && !meta.readonly) {
                        // *********************************************************************
                        // *********************************************************************
                        console.log(`ARRAY is editable: ${meta.key}`);
                    }

                    return div;
                }
                
                renderObject(meta, readonly) {
                    let div = createElementFromOuterHtml('<div design="dataeditor-widget-object"></div>');
                    let table = createElement('table-widget').setColumnCount(2);

                    for (let field of meta.fields) {
                        if (field.property in meta.value) {
                            let surface = this.renderValue(field.key, !readonly && !meta.readonly );

                            if (surface) {
                                table.appendRow([
                                    {
                                        content: field.label,
                                        style: 'color:var(--label-color);',
                                    },
                                    {
                                        content: surface
                                    }
                                ]);
                            }
                        }
                    }

                    if (!readonly && !meta.readonly) {
                        // *********************************************************************
                        // *********************************************************************
                        console.log(`OBJECT is editable: ${meta.key}`);
                    }

                    div.append(table);
                    return div;
                }

                renderScalar(meta, readonly) {
                    let options;

                    if (StringType.verify(meta.value)) {
                        options = {
                            design: 'dataeditor-widget-content',
                            class: 'dataeditor-widget-string',
                            'rds-bind': meta.key,
                            'rds-meta': meta,
                        };
                    }
                    else if (NumberType.verify(meta.value)) {
                        options = {
                            design: 'dataeditor-widget-content',
                            class: 'dataeditor-widget-number',
                            'rds-bind': meta.key,
                            'rds-meta': meta,
                        };
                    }
                    else if (BooleanType.verify(meta.value)) {
                        options = {
                            design: 'dataeditor-widget-content',
                            class: 'dataeditor-widget-boolean',
                            'rds-bind': meta.key,
                            'rds-meta': meta,
                        };
                    }
                    else if (DateType.verify(meta.value)) {
                        options = {
                            design: 'dataeditor-widget-content',
                            class: 'dataeditor-widget-boolean',
                            'rds-bind': meta.key,
                            'rds-meta': meta,
                        };
                    }
                    else if (PatternType.verify(value)) {
                        options = {
                            design: 'dataeditor-widget-content',
                            class: 'dataeditor-widget-regex',
                            'rds-bind': meta.key,
                            'rds-meta': meta,
                        };
                    }
                    else {
                        options = {
                            design: '"dataeditor-widget-content"',
                            class: 'dataeditor-widget-other',
                            'rds-bind': meta.key,
                            'rds-meta': meta,
                        };
                    }

                    if (!readonly && !meta.readonly) {
                        options['evt-click'] = 'edit';
                        options.class = `${options.class} dataeditor-widget-editable`;
                    }

                    return createElement('div', options);
                }

                renderValue(key, readonly) {
                    let meta = this.getMeta(key);

                    if (meta.type === ArrayType) {
                        return this.renderArray(meta, readonly); 
                    }
                    else if (meta.type === ObjectType) {
                        return this.renderObject(meta, readonly);
                    }
                    else {
                        return this.renderScalar(meta, readonly);
                    }
                }
            }
        </script>
        <style>
            [design=content] {
                margin: 0px;
                padding: 0px;
                font-family: 'Courier New', Courier, monospace;

            .dataeditor-widget-boolean {

            }
            .dataeditor-widget-date {

    <widget tagname="input-widget" settings="stub:true;">
        <script>
            class InputWidget extends Widget {
                static stdInputTypes = mkRdsEnum(
                    'color',
                    'date',
                    'datetime-local',
                    'email',
                    'image',
                    'month',
                    'number',
                    'password',
                    'range',
                    'tel',
                    'text',
                    'time',
                    'url',
                    'week',
                );

                static optsShape = mkRdsShape([{
                    text: StringType,
                    value: StringType,
                    _key: StringType,
                }]);

                constructor(arg) {
                    super(arg);
                }

                buildFieldsetOptions() {
                    let options = this.buildOptions();

                    let attributes = {
                        id: '',
                        type: 'radio',
                        name: '',
                        class: 'input-widget-radio',
                    };

                    if (this.getRdsBind) {
                        attributes.name = this.getRdsBind();
                        attributes['rds-bind'] = this.getRdsBind();
                    }

                    for (let option of options) {
                        attributes.id = Crypto.generateUUID();
                        attributes.value = option.value;

                        this.replacement.append(
                            createElement('div', {
                                class: 'input-widget-radio-div',
                            })
                            .append(
                                createElement('input', attributes),
                                mkHtmlElement('label', {
                                    for: attributes.id,
                                    class: 'input-widget-radio-label',
                                })
                                .setInnerHtml(option.text),
                            )
                        );
                    }
                }

                buildFieldsetLegend() {
                    if (this.getRdsLegend) {
                        let legend = createElement('legend', {
                            class: 'input-widget-radio-legend',
                        });

                        legend.setInnerHtml(this.getRdsLegend().trim());
                        this.replacement.prepend(legend);
                        return;
                    }

                    if (this.hasInnerElements()) {
                        for (let innerElement of this.getInnerElements()) {
                            if (innerElement.getTagName() == 'legend') {
                                this.replacement.prepend(innerElement);
                                return;
                            }
                        }
                    }
                    else if (this.hasInnerSettings()) {
                        let text = this.getInnerSettings().legend;

                        if (StringType.verify(text)) {
                            let legend = createElement('legend', {
                                class: 'input-widget-radio-legend',
                            });

                            legend.setInnerHtml(text.trim());
                            this.replacement.prepend(legend);
                            return;
                        }
                    }
                }

                buildOptions() {
                    let options = [];

                    if (this.getRdsOptions) {
                        let opts = RdsText.parseAttributeEncoded(this.getRdsOptions());
                        
                        for (let value in opts) {
                            options.push({ text: opts[value], value: value });
                        }
                        
                        if (!InputWidget.optsShape.verify(options)) {
                            options = [];
                        }
                    }

                    if (!options.length && this.getRdsOptionsKey) {
                        let optsKey = this.getRdsOptionsKey();
                        let opts = Controller.getDataValue(this, optsKey);
                        
                        if (InputWidget.optsShape.verify(opts)) {
                            options = opts;
                        }
                    }

                    if (!options.length) {
                        if (this.getInnerElements().length) {
                            for (let innerElement of this.getInnerElements()) {
                                if (innerElement.getTagName() == 'option') {
                                    options.push({
                                        text: innerElement.getInnerHtml().trim(),
                                        value: innerElement.getAttribute('value'),
                                    });
                                }
                            }
                        
                            if (!InputWidget.optsShape.verify(options)) {
                                options = [];
                            }
                        }
                    }

                    if (!options.length) {
                        if (this.hasInnerSettings() && ArrayType.verify(this.getInnerSettings().options)) {
                            let opts = this.getInnerSettings().options;

                            if (InputWidget.optsShape.verify(opts)) {
                                options = opts;
                            }
                        }
                    }

                    return options;
                }

                buildSelectOptions() {
                    let options = this.buildOptions();

                    let optionElements = options.map(opt => {
                        let optionElement = createElement('option', {
                            value: opt.value,
                            class: 'input-widget-select-option',
                        });

                        let innerOption;

                        if (opt.shape) {
                            innerOption = createElementFromOuterHtml(
                                `<span>${opt.text.trim()}</span>` +
                                `<span class="input-widget-select-option-svg"><svg class="icon icon-small" rds-shape="${opt.shape}"></svg></span>`
                            );
                        }
                        else {
                            innerOption = createElementFromOuterHtml(
                                `<span>${opt.text.trim()}</span>` +
                                `<span class="input-widget-select-option-svg"></span>`
                            );
                        }

                        optionElement.append(...innerOption);
                        return optionElement;
                    });

                    this.replacement.append(...optionElements);
                }
                
                createToggle(attributes) {
                    let bind = '';
                    let disabled = '';
                    let timing = false;

                    if ('rds-bind' in attributes) {
                        bind = ` rds-bind="${attributes['rds-bind']}"`;
                    }

                    if ('rds-disabled' in attributes) {
                        disabled = ` rds-disabled="${attributes['rds-disabled']}"`;
                    }

                    let toggle = createElementFromOuterHtml(
                        `<span${disabled}>
                            <input type="checkbox"${bind} style="display:none;">
                            <svg rds-shape="circle"></svg>
                        </span>`
                    );

                    let checkbox = toggle.getChildElementAt(0);
                    let knob = toggle.getChildElementAt(1);

                    checkbox.init = () => {
                        super.init();
                        checkbox.knob = knob;
                        checkbox.toggle = toggle;

                        if (checkbox.getRdsBind) {
                            checkbox.setProperty('checked', Controller.getDataValue(checkbox, checkbox.getRdsBind()));
                        }
                        else {
                            checkbox.setProperty('checked', false);
                        }

                        checkbox.update();

                        checkbox.toggle.on('click', message => {
                        if (!checkbox.toggle.hasAttribute('disabled')) {
                            checkbox.node.click();
                        }
                    });

                        Controller.on('Set', message => {
                            if ('rds-bind' in attributes && message.dotted == attributes['rds-bind']) {
                                checkbox.update();
                            }
                        });

                        checkbox.knob.setStyle('transition-duration', '.45s');
                        checkbox.toggle.setStyle('transition-delay', '.45s');
                    };

                    checkbox.update = () => {
                        if (checkbox.getProperty('checked')) {
                            checkbox.knob.clearClassName('input-widget-toggle-knob-unselected');
                            checkbox.toggle.clearClassName('input-widget-toggle-unselected');

                            checkbox.knob.setClassName('input-widget-toggle-knob-selected');
                            checkbox.toggle.setClassName('input-widget-toggle-selected');
                        }
                        else {
                            checkbox.knob.clearClassName('input-widget-toggle-knob-selected');
                            checkbox.toggle.clearClassName('input-widget-toggle-selected');

                            checkbox.knob.setClassName('input-widget-toggle-knob-unselected');
                            checkbox.toggle.setClassName('input-widget-toggle-unselected');
                        }
                    };

                    return toggle;
                }
 
                init() {
                    let attributes = this.filterAttributes('type');

                    if (this.hasAttribute('type')) {
                        let type = this.getAttribute('type');

                        if (InputWidget.stdInputTypes.has(type)) {
                            attributes.type = type;
                            attributes.class = RdsText.concat('input-widget-input', attributes.class);
                            this.replacement = createElement('input', attributes);
                        }
                        else if (type in { button:0, submit:0 }) {
                            attributes.type = type;
                            attributes.class = RdsText.concat('input-widget-button', attributes.class);
                            this.replacement = createElement('input', attributes);
                        }
                        else if (type == 'checkbox') {
                            attributes.type = type;
                            attributes.class = RdsText.concat('input-widget-checkbox', attributes.class);
                            this.replacement = createElement('input', attributes);
                        }
                        else if (type == 'essay') {
                            attributes.class = RdsText.concat('input-widget-essay', attributes.class);
                            this.replacement = createElement('textarea', attributes);
                        }
                        else if (type == 'fieldset') {
                            attributes.class = 'input-widget-radio-fieldset';
                            Data.filter(attributes, (key, value) => key.startsWith('rds-bind'));
                            this.replacement = createElement('fieldset', attributes);
                            this.buildFieldsetOptions();
                            this.buildFieldsetLegend();
                        }
                        else if (type == 'select') {
                            attributes.class = 'input-widget-select';
                            this.replacement = createElement('select', attributes);
                            this.buildSelectOptions();
                            this.replacement.once('focusin', message => this.layoutSelect());
                        }
                        else if (type == 'toggle') {
                            this.replacement = this.createToggle(attributes);
                        }
                    }

                    this.replacement.setAttribute('id', Crypto.generateUUID());
                }

                layoutSelect() {
                    let maxWidth = 0;
                    let hasSvg = false;

                    for (let option of this.replacement.getChildElements()) {
                        let text = option.getChildElementAt(0);
                        let svg = option.getChildElementAt(1);
                        
                        if (text.getClientWidth() > maxWidth) {
                            maxWidth = text.getClientWidth();
                        }

                        if (svg.getChildElements().length) {
                            hasSvg = true;
                        }
                    }

                    for (let option of this.replacement.getChildElements()) {
                        option.getChildElementAt(0).setStyle({ width: `${maxWidth+10}px` });
                    }

                    if (!hasSvg) {
                        for (let option of this.replacement.getChildElements()) {
                            option.getChildElementAt(1).setStyle({ width: '0px' });
                        }
                    }
                }
            }
        </script>
    </widget>
